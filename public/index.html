  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ad196721-2a93-4772-b9d7-9ec2e8960123\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5e602290-0f9d-4347-b9a3-75b04ad00893\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n</style>\n<style>\n  /* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n     PROFILM \u00b7 DESIGN TOKENS\n     Brand: navy #15225a \u00b7 orange #f37021 \u00b7 gold #f5b800\n     Aesthetic: high-tech / premium \u2014 grid lines, glass,\n     scientific typography, heat-spectrum accents.\n     \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  :root {\n    --bg:        #f8faff;        /* tr\u1eafng xanh \u2014 tr\u1eafng tinh v\u1edbi hint navy */\n    --bg-2:      #f0f4ff;        /* light navy-tinted panel */\n    --bg-3:      #e6ecff;        /* soft blue panel raised */\n    --navy:      #15225a;        /* logo navy \u2014 \"pro\" */\n    --navy-2:    #1f2d70;\n    --ink:       #0e1840;        /* deep navy text */\n    --ink-2:     #485882;        /* medium navy-blue */\n    --muted:     #7a87b5;        /* muted navy */\n    --line:      rgba(21, 34, 90, 0.10);\n    --line-2:    rgba(21, 34, 90, 0.20);\n    --orange:    #f37021;        /* logo orange \u2014 \"film\" */\n    --orange-2:  #ff8a3d;\n    --gold:      #f5b800;        /* logo gold dot */\n    --cyan:      #4a8fff;        /* clear blue \u2014 complement to orange */\n    --red:       #ff6b5e;        /* heat red */\n    --green:     #6ee7a8;\n    --grad-heat: linear-gradient(90deg, #4a8fff 0%, #a8d8ff 35%, #f5b800 65%, #f37021 85%, #ff6b5e 100%);\n    --sans:  'Be Vietnam Pro', system-ui, -apple-system, sans-serif;\n    --display: 'Playfair Display', 'Be Vietnam Pro', Georgia, serif;\n    --mono:  'JetBrains Mono', ui-monospace, monospace;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body {\n    background: var(--bg);\n    color: var(--ink);\n    font-family: var(--sans);\n    font-size: 16px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n  /* global tech grid background */\n  body::before {\n    content: \"\";\n    position: fixed; inset: 0;\n    pointer-events: none;\n    background-image:\n      linear-gradient(to right, rgba(21,34,90,0.04) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(21,34,90,0.04) 1px, transparent 1px);\n    background-size: 64px 64px;\n    z-index: 0;\n    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 90%);\n    -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 90%);\n  }\n  img { display: block; max-width: 100%; }\n  a { color: inherit; text-decoration: none; }\n  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }\n\n  /* \u2500\u2500\u2500 shared \u2500\u2500\u2500 */\n  .wrap { max-width: 1320px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }\n  .eyebrow {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--orange);\n    display: inline-flex; align-items: center; gap: 10px;\n  }\n  .eyebrow::before {\n    content: \"\";\n    width: 24px; height: 1px;\n    background: var(--orange);\n  }\n  .pill {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    padding: 7px 14px;\n    border: 1px solid var(--line-2);\n    border-radius: 999px;\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--ink-2);\n    background: rgba(220, 228, 255, 0.55);\n    backdrop-filter: blur(8px);\n  }\n  .pill .dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--gold);\n    box-shadow: 0 0 12px var(--gold);\n  }\n  .btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 13px 22px;\n    border-radius: 999px;\n    font-size: 13px;\n    font-weight: 500;\n    letter-spacing: 0.04em;\n    transition: all .2s ease;\n    font-family: var(--display);\n  }\n  .btn-primary {\n    background: var(--orange);\n    color: #fff;\n    box-shadow: 0 0 0 1px rgba(255,255,255,0.10), 0 12px 30px -8px rgba(243,112,33,0.45);\n  }\n  .btn-primary:hover {\n    background: var(--orange-2);\n    transform: translateY(-1px);\n    box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 18px 36px -8px rgba(243,112,33,0.55);\n  }\n  .btn-ghost {\n    border: 1px solid var(--line-2);\n    color: var(--ink);\n    background: rgba(220, 228, 255, 0.40);\n    backdrop-filter: blur(8px);\n  }\n  .btn-ghost:hover { background: rgba(220, 228, 255, 0.70); border-color: var(--orange); }\n  .arrow { display: inline-block; transition: transform .2s ease; }\n  .btn:hover .arrow { transform: translateX(3px); }\n\n  /* \u2500\u2500\u2500 nav \u2500\u2500\u2500 */\n  nav.top {\n    position: sticky; top: 0; z-index: 50;\n    background: rgba(248, 250, 255, 0.92);\n    backdrop-filter: blur(20px) saturate(140%);\n    border-bottom: 1px solid var(--line);\n  }\n  nav.top .row {\n    display: flex; align-items: center; justify-content: space-between;\n    height: 76px;\n  }\n  .brand {\n    display: flex; align-items: center; gap: 0;\n    height: 44px;\n  }\n  .brand img {\n    height: 44px;\n    width: auto;\n    filter: brightness(0) invert(1);\n    /* The provided logo is dark-on-light. We invert it to white,\n       then re-tint by overlaying a colored copy below. */\n    display: none;\n  }\n  .brand .logo-wordmark {\n    height: 44px;\n    width: auto;\n    /* show the logo as-is on a panel */\n  }\n  .brand-block {\n    display: flex; align-items: center; gap: 12px;\n    padding: 6px 14px 6px 6px;\n    border-radius: 12px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.90), rgba(248,250,255,0.70));\n    border: 1px solid var(--line);\n  }\n  .brand-block .logo-bg {\n    background: #fff;\n    border-radius: 8px;\n    padding: 4px 8px;\n    display: grid; place-items: center;\n  }\n  .brand-block .logo-bg img { height: 30px; display: block; }\n  .brand-block .tag {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    color: var(--muted);\n    text-transform: uppercase;\n  }\n  .nav-links {\n    display: flex; gap: 36px;\n    font-size: 14px; color: var(--ink-2);\n    font-family: var(--display);\n    font-weight: 500;\n  }\n  .nav-links a { position: relative; transition: color .2s ease; }\n  .nav-links a:hover { color: var(--orange); }\n  .nav-links a::after {\n    content: \"\";\n    position: absolute; bottom: -6px; left: 0;\n    height: 1px; width: 0; background: var(--orange);\n    transition: width .2s ease;\n  }\n  .nav-links a:hover::after { width: 100%; }\n  .nav-cta { display: flex; align-items: center; gap: 18px; }\n  .phone-num {\n    font-family: var(--mono);\n    font-size: 13px;\n    letter-spacing: 0.06em;\n    color: var(--ink);\n    display: flex; align-items: center; gap: 8px;\n  }\n  .phone-num .pulse {\n    width: 8px; height: 8px;\n    border-radius: 50%;\n    background: var(--gold);\n    box-shadow: 0 0 0 0 var(--gold);\n    animation: pulse 2s infinite;\n  }\n  @keyframes pulse {\n    0% { box-shadow: 0 0 0 0 rgba(245,184,0,0.5); }\n    70% { box-shadow: 0 0 0 10px rgba(245,184,0,0); }\n    100% { box-shadow: 0 0 0 0 rgba(245,184,0,0); }\n  }\n\n  /* \u2500\u2500\u2500 hero \u2500\u2500\u2500 */\n  .hero {\n    padding: 100px 0 80px;\n    position: relative;\n  }\n  .hero::before {\n    content: \"\";\n    position: absolute;\n    top: 10%; left: 50%;\n    width: 80vw; height: 60vw;\n    transform: translateX(-50%);\n    background: radial-gradient(ellipse at center, rgba(243,112,33,0.10) 0%, transparent 60%);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .hero .grid {\n    display: grid;\n    grid-template-columns: 1.1fr 0.9fr;\n    gap: 80px;\n    align-items: center;\n    position: relative;\n    z-index: 1;\n  }\n  .hero h1 {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: clamp(48px, 6.4vw, 92px);\n    line-height: 0.98;\n    letter-spacing: -0.020em;\n    color: var(--ink);\n    margin: 28px 0 28px;\n    text-wrap: balance;\n  }\n  .hero h1 .accent {\n    background: linear-gradient(90deg, var(--orange) 0%, var(--gold) 100%);\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    font-style: italic;\n    font-weight: 600;\n  }\n  .hero h1 .strike {\n    position: relative; display: inline-block;\n  }\n  .hero h1 .strike::after {\n    content: \"\";\n    position: absolute;\n    left: -4%; right: -4%;\n    top: 55%;\n    height: 4px;\n    background: var(--orange);\n    transform: rotate(-2deg);\n    opacity: 0.85;\n  }\n  .hero .lead {\n    max-width: 520px;\n    color: var(--ink-2);\n    font-size: 17px;\n    line-height: 1.6;\n    margin-bottom: 36px;\n  }\n  .hero-meta {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 0;\n    padding: 28px 0 0;\n    border-top: 1px solid var(--line);\n    margin-top: 40px;\n    max-width: 600  border-top: 0; }\n  .hv-corner.br { bottom: 16px; right: 16px; border-left: 0; border-top: 0; }\n  .hv-label {\n    position: absolute;\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .hv-label.top { top: 26px; left: 50%; transform: translateX(-50%); }\n  .hv-label.bot { bottom: 26px; left: 50%; transform: translateX(-50%); color: var(--orange); }\n\n  /* heat shield diagram */\n  .shield-diagram {\n    position: absolute; inset: 0;\n    display: grid;\n    place-items: center;\n  }\n  .shield-svg {\n    width: 78%;\n    height: auto;\n  }\n  /* Animated rays from the sun */\n  @keyframes rayFlow {\n    0% { stroke-dashoffset: 60; }\n    100% { stroke-dashoffset: 0; }\n  }\n  @keyframes coolFlow {\n    0% { stroke-dashoffset: 0; }\n    100% { stroke-dashoffset: 40; }\n  }\n  .ray { animation: rayFlow 1.6s linear infinite; }\n  .cool { animation: coolFlow 2.4s linear infinite; }\n\n  .hv-readout {\n    position: absolute;\n    bottom: 50px; left: 26px;\n    background: rgba(240, 244, 255, 0.92);\n    backdrop-filter: blur(10px);\n    border: 1px solid var(--line-2);\n    border-radius: 10px;\n    padding: 12px 14px;\n    font-family: var(--mono);\n    font-size: 11px;\n    color: var(--ink-2);\n    letter-spacing: 0.04em;\n    line-height: 1.6;\n    box-shadow: 0 4px 16px rgba(21,34,90,0.10);\n  }\n  .hv-readout .row { display: flex; gap: 14px; }\n  .hv-readout .k { color: var(--muted); }\n  .hv-readout .v { color: var(--cyan); }\n  .hv-readout .v.hot { color: var(--orange); }\n\n  .hv-badge {\n    position: absolute;\n    bottom: 50px; right: 26px;\n    background: var(--orange);\n    color: #fff;\n    border-radius: 10px;\n    padding: 12px 14px;\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    text-align: right;\n    line-height: 1.5;\n  }\n  .hv-badge b {\n    display: block;\n    font-family: v
